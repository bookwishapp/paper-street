<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Admin - Paper Street Thrift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #F8F3EA;
            --surface: #FDF9F3;
            --teal: #5AACAA;
            --rose: #E07E6A;
            --butter: #EAC45A;
            --sage: #84AE88;
            --ink: #1B2B38;
            --muted: #7A8C96;
            --border: #E2D9CC;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg);
            color: var(--ink);
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .logout-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: var(--rose);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        .logout-btn:hover {
            opacity: 0.9;
        }

        .section {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section h2 {
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            color: var(--ink);
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--ink);
            font-size: 0.95rem;
        }

        label.required::after {
            content: " *";
            color: var(--rose);
        }

        input[type="text"],
        input[type="date"],
        input[type="time"],
        textarea,
        select {
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            background: white;
            color: var(--ink);
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--teal);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-primary {
            background: var(--teal);
            color: white;
        }

        .btn-secondary {
            background: var(--muted);
            color: white;
        }

        .btn-danger {
            background: var(--rose);
            color: white;
        }

        .btn-success {
            background: var(--sage);
            color: white;
        }

        .event-list {
            display: grid;
            gap: 1rem;
        }

        .event-card {
            background: white;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: start;
        }

        .event-info {
            display: grid;
            gap: 0.5rem;
        }

        .event-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--ink);
        }

        .event-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .event-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
        }

        .category-swap_paper { background: var(--butter); }
        .category-swap_books { background: var(--teal); }
        .category-swap_puzzles_games { background: var(--rose); }
        .category-swap_art { background: var(--sage); }
        .category-thursday_reading { background: #6B5B95; }
        .category-thursday_art { background: #D4A5A5; }
        .category-thursday_games { background: #9A8C98; }
        .category-thursday_writing { background: #C9ADA7; }
        .category-thursday_workshop { background: #88AB75; }
        .category-special { background: var(--ink); }

        .event-actions {
            display: flex;
            gap: 0.5rem;
            flex-direction: column;
        }

        .event-actions button {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .message {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .logout-btn {
                position: static;
                margin-bottom: 1rem;
                width: 100%;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .event-card {
                grid-template-columns: 1fr;
            }

            .event-actions {
                flex-direction: row;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">Logout</button>

    <div class="container">
        <h1>Events Admin</h1>
        <p class="subtitle">Manage events for Paper Street Thrift</p>

        <div id="message" class="message"></div>

        <!-- Add/Edit Event Form -->
        <div class="section">
            <h2 id="form-title">Add New Event</h2>
            <form id="event-form">
                <input type="hidden" id="event-id">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="title" class="required">Event Title</label>
                        <input type="text" id="title" name="title" required>
                    </div>

                    <div class="form-group">
                        <label for="category" class="required">Category</label>
                        <select id="category" name="category" required>
                            <option value="">Select category...</option>
                            <option value="swap_paper">Swap: Paper</option>
                            <option value="swap_books">Swap: Books</option>
                            <option value="swap_puzzles_games">Swap: Puzzles & Games</option>
                            <option value="swap_art">Swap: Art</option>
                            <option value="thursday_reading">Thursday: Reading</option>
                            <option value="thursday_art">Thursday: Art</option>
                            <option value="thursday_games">Thursday: Games</option>
                            <option value="thursday_writing">Thursday: Writing</option>
                            <option value="thursday_workshop">Thursday: Workshop</option>
                            <option value="special">Special Event</option>
                        </select>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="event_date" class="required">Date</label>
                        <input type="date" id="event_date" name="event_date" required>
                    </div>

                    <div class="form-group">
                        <label for="event_time" class="required">Time</label>
                        <input type="time" id="event_time" name="event_time" required>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="admission">Admission</label>
                        <input type="text" id="admission" name="admission" placeholder="e.g., Free, $5, Donation">
                    </div>

                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="is_recurring" name="is_recurring">
                            <label for="is_recurring">Recurring Event</label>
                        </div>
                    </div>
                </div>

                <div class="form-grid full">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="4"></textarea>
                    </div>
                </div>

                <div class="form-grid full">
                    <div class="form-group">
                        <label for="notes">Internal Notes</label>
                        <textarea id="notes" name="notes" rows="3" placeholder="Notes for internal use only"></textarea>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-primary" id="submit-btn">Add Event</button>
                    <button type="button" class="btn-secondary" id="cancel-btn" onclick="cancelEdit()" class="hidden">Cancel</button>
                </div>
            </form>
        </div>

        <!-- Events List -->
        <div class="section">
            <h2>Upcoming Events</h2>
            <div id="events-list" class="loading">
                Loading events...
            </div>
        </div>
    </div>

    <script>
        let editingEventId = null;

        // Load events on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadEvents();
        });

        // Event form submission
        document.getElementById('event-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                title: document.getElementById('title').value,
                event_date: document.getElementById('event_date').value,
                event_time: document.getElementById('event_time').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                is_recurring: document.getElementById('is_recurring').checked,
                admission: document.getElementById('admission').value,
                notes: document.getElementById('notes').value
            };

            try {
                let response;
                if (editingEventId) {
                    // Update existing event
                    response = await fetch(`/admin/events/${editingEventId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    });
                } else {
                    // Create new event
                    response = await fetch('/admin/events', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    });
                }

                if (response.ok) {
                    showMessage('Event saved successfully!', 'success');
                    document.getElementById('event-form').reset();
                    editingEventId = null;
                    updateFormMode();
                    loadEvents();
                } else {
                    const error = await response.json();
                    showMessage('Error: ' + (error.error || 'Failed to save event'), 'error');
                }
            } catch (error) {
                console.error('Error saving event:', error);
                showMessage('Error: Failed to save event', 'error');
            }
        });

        async function loadEvents() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const response = await fetch(`/api/events?from=${today}`);

                if (!response.ok) {
                    throw new Error('Failed to fetch events');
                }

                const events = await response.json();
                displayEvents(events);
            } catch (error) {
                console.error('Error loading events:', error);
                document.getElementById('events-list').innerHTML =
                    '<div class="empty-state">Error loading events. Please refresh the page.</div>';
            }
        }

        function displayEvents(events) {
            const container = document.getElementById('events-list');

            if (events.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
                        </svg>
                        <p>No upcoming events</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = events.map(event => {
                const date = new Date(event.event_date).toLocaleDateString('en-US', {
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    timeZone: 'UTC'
                });
                const time = formatTime(event.event_time);

                return `
                    <div class="event-card">
                        <div class="event-info">
                            <div class="event-title">${escapeHtml(event.title)}</div>
                            <div class="event-meta">
                                <span>📅 ${date}</span>
                                <span>🕐 ${time}</span>
                                ${event.admission ? `<span>🎫 ${escapeHtml(event.admission)}</span>` : ''}
                                ${event.is_recurring ? '<span>🔄 Recurring</span>' : ''}
                            </div>
                            <div>
                                <span class="category-badge category-${event.category}">
                                    ${formatCategory(event.category)}
                                </span>
                            </div>
                            ${event.description ? `<p>${escapeHtml(event.description)}</p>` : ''}
                            ${event.notes ? `<p style="color: var(--muted); font-size: 0.9rem;"><em>Notes: ${escapeHtml(event.notes)}</em></p>` : ''}
                        </div>
                        <div class="event-actions">
                            <button class="btn-primary" onclick="editEvent('${event.id}')">Edit</button>
                            <button class="btn-danger" onclick="deleteEvent('${event.id}', '${escapeHtml(event.title)}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function editEvent(id) {
            try {
                const response = await fetch(`/api/events`);
                const events = await response.json();
                const event = events.find(e => e.id === id);

                if (!event) {
                    showMessage('Event not found', 'error');
                    return;
                }

                // Populate form
                document.getElementById('title').value = event.title;
                document.getElementById('event_date').value = event.event_date;
                document.getElementById('event_time').value = event.event_time;
                document.getElementById('description').value = event.description || '';
                document.getElementById('category').value = event.category;
                document.getElementById('is_recurring').checked = event.is_recurring;
                document.getElementById('admission').value = event.admission || '';
                document.getElementById('notes').value = event.notes || '';

                editingEventId = id;
                updateFormMode();

                // Scroll to form
                document.getElementById('event-form').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                console.error('Error loading event for editing:', error);
                showMessage('Error loading event', 'error');
            }
        }

        function cancelEdit() {
            editingEventId = null;
            document.getElementById('event-form').reset();
            updateFormMode();
        }

        function updateFormMode() {
            const formTitle = document.getElementById('form-title');
            const submitBtn = document.getElementById('submit-btn');
            const cancelBtn = document.getElementById('cancel-btn');

            if (editingEventId) {
                formTitle.textContent = 'Edit Event';
                submitBtn.textContent = 'Update Event';
                cancelBtn.classList.remove('hidden');
            } else {
                formTitle.textContent = 'Add New Event';
                submitBtn.textContent = 'Add Event';
                cancelBtn.classList.add('hidden');
            }
        }

        async function deleteEvent(id, title) {
            if (!confirm(`Are you sure you want to delete "${title}"?`)) {
                return;
            }

            try {
                const response = await fetch(`/admin/events/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showMessage('Event deleted successfully', 'success');
                    loadEvents();

                    // If we were editing this event, cancel the edit
                    if (editingEventId === id) {
                        cancelEdit();
                    }
                } else {
                    const error = await response.json();
                    showMessage('Error: ' + (error.error || 'Failed to delete event'), 'error');
                }
            } catch (error) {
                console.error('Error deleting event:', error);
                showMessage('Error: Failed to delete event', 'error');
            }
        }

        async function logout() {
            try {
                await fetch('/admin/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (error) {
                console.error('Error logging out:', error);
            }
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type} show`;

            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 5000);
        }

        function formatTime(timeString) {
            const [hours, minutes] = timeString.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const displayHour = hour % 12 || 12;
            return `${displayHour}:${minutes} ${ampm}`;
        }

        function formatCategory(category) {
            return category
                .split('_')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(': ');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
